name: Publish Scheduled Posts

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled post publishing
        run: |
          curl -X GET "${{ secrets.APP_URL }}/api/cron/publish-scheduled" \
            -H "x-cron-secret: manual-trigger" \
            --fail --silent --show-error
